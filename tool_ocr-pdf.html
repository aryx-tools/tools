<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>OCR PDF</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Poppins',sans-serif;background:#f4f4f8;min-height:100vh;padding:20px;display:flex;align-items:flex-start;justify-content:center;}
.tool-wrap{background:#fff;border-radius:12px;padding:30px;max-width:700px;width:100%;box-shadow:0 4px 16px rgba(0,0,0,0.08);}
.tool-info{font-size:14px;color:#444;background:#e0f7f4;padding:10px 14px;border-radius:8px;display:block;margin-bottom:20px;border-left:4px solid #009688;}
.upload-area{border:2px dashed #d1c3c3;padding:40px;border-radius:10px;background:#fafafa;text-align:center;transition:0.3s;}
.upload-area.dragover{border-color:#009688;background:#e0f7f4;}
.select-btn{display:inline-block;background:#009688;color:#fff;padding:13px 32px;border-radius:50px;cursor:pointer;font-size:16px;font-family:'Poppins',sans-serif;position:relative;transition:background 0.2s;}
.select-btn:hover{background:#00796b;}
.select-btn input{position:absolute;opacity:0;left:0;top:0;width:100%;height:100%;cursor:pointer;}
#status{text-align:center;margin-top:15px;font-weight:600;color:#009688;display:none;}
#result{display:none;margin-top:20px;}
#result textarea{width:100%;height:280px;padding:12px;border:1px solid #ddd;border-radius:8px;font-size:13px;resize:vertical;outline:none;}
#result textarea:focus{border-color:#009688;}
.btn-row{text-align:center;margin-top:12px;}
.action-btn{background:#009688;color:#fff;border:none;padding:12px 26px;font-size:15px;border-radius:50px;cursor:pointer;font-family:'Poppins',sans-serif;transition:background 0.2s;}
.action-btn:hover{background:#00796b;}
</style>
</head>
<body>
<div class="tool-wrap">
  <span class="tool-info">Upload a scanned PDF to extract its text using OCR technology.</span>
  <div class="upload-area" id="drop-area">
    <label class="select-btn">
      + Choose PDF
      <input accept="application/pdf" id="file-input" type="file"/>
    </label>
  </div>
  <div id="status"></div>
  <div id="result">
    <textarea id="ocr-text" readonly placeholder="Extracted text will appear here..."></textarea>
    <div class="btn-row">
      <button class="action-btn" id="copy-btn">Copy Text</button>
    </div>
  </div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
<script>
pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
const drop=document.getElementById('drop-area');
const inp=document.getElementById('file-input');
const status=document.getElementById('status');
const result=document.getElementById('result');
const textArea=document.getElementById('ocr-text');
['dragenter','dragover'].forEach(ev=>drop.addEventListener(ev,e=>{e.preventDefault();drop.classList.add('dragover');}));
['dragleave','drop'].forEach(ev=>drop.addEventListener(ev,e=>{e.preventDefault();drop.classList.remove('dragover');}));
drop.addEventListener('drop',e=>process(e.dataTransfer.files[0]));
inp.addEventListener('change',e=>process(e.target.files[0]));
async function process(file){
  if(!file)return;
  status.style.display='block';status.textContent='Loading PDF...';result.style.display='none';
  const buf=await file.arrayBuffer();
  const pdf=await pdfjsLib.getDocument({data:buf}).promise;
  const worker=await Tesseract.createWorker('eng');
  let allText='';
  for(let i=1;i<=pdf.numPages;i++){
    status.textContent='Processing page '+i+' of '+pdf.numPages+'...';
    const page=await pdf.getPage(i);
    const vp=page.getViewport({scale:2.0});
    const canvas=document.createElement('canvas');
    canvas.width=vp.width;canvas.height=vp.height;
    await page.render({canvasContext:canvas.getContext('2d'),viewport:vp}).promise;
    const{data:{text}}=await worker.recognize(canvas);
    allText+='--- Page '+i+' ---\n'+text+'\n\n';
  }
  await worker.terminate();
  textArea.value=allText;
  status.textContent='OCR complete. '+pdf.numPages+' page(s) processed.';
  result.style.display='block';
}
document.getElementById('copy-btn').addEventListener('click',function(){
  textArea.select();document.execCommand('copy');
  this.textContent='Copied!';setTimeout(()=>this.textContent='Copy Text',2000);
});
</script>
</body>
</html>
