<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>HTML to PDF</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Poppins',sans-serif;background:#f4f4f8;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;}
.tool-wrap{background:#fff;border-radius:12px;padding:30px;max-width:700px;width:100%;box-shadow:0 4px 16px rgba(0,0,0,0.08);}
.tool-info{font-size:14px;color:#444;background:#e0f7f4;padding:10px 14px;border-radius:8px;display:block;margin-bottom:20px;border-left:4px solid #009688;}
#html-inp{width:100%;height:200px;padding:12px;border:1px solid #ddd;border-radius:8px;font-size:13px;font-family:monospace;resize:vertical;outline:none;margin-bottom:15px;box-sizing:border-box;}
#html-inp:focus{border-color:#009688;}
.btn-row{text-align:center;}
.action-btn{background:#009688;color:#fff;border:none;padding:13px 32px;font-size:16px;border-radius:50px;cursor:pointer;font-family:'Poppins',sans-serif;transition:background 0.2s;}
.action-btn:hover{background:#00796b;}
#status{text-align:center;margin-top:15px;font-weight:600;color:#009688;display:none;}
.progress-bar{width:100%;background:#e0e0e0;border-radius:50px;height:8px;margin-top:12px;display:none;}
.progress-fill{height:8px;background:#009688;border-radius:50px;transition:width 0.3s;width:0%;}
.download-btn{background:#e53935;color:#fff;border:none;padding:13px 32px;font-size:16px;border-radius:50px;cursor:pointer;font-family:'Poppins',sans-serif;text-decoration:none;display:none;margin-top:12px;transition:background 0.2s;}
.download-btn:hover{background:#c62828;}
.error-box{background:#fff3f3;border:1px solid #f44336;border-radius:8px;padding:12px 16px;color:#c62828;font-size:13px;margin-top:12px;display:none;}
</style>
</head>
<body>
<div class="tool-wrap">
  <span class="tool-info">Paste your HTML code below and convert it to a PDF document.</span>
  <textarea id="html-inp" placeholder="Paste your HTML code here..."></textarea>
  <div class="btn-row">
    <button class="action-btn" id="convert-btn">Convert to PDF</button>
  </div>
  <div class="progress-bar" id="progress-bar">
    <div class="progress-fill" id="progress-fill"></div>
  </div>
  <div id="status"></div>
  <div class="error-box" id="error-box"></div>
  <div style="text-align:center;">
    <a class="download-btn" id="download-btn">Download PDF</a>
  </div>
</div>
<script>
const PUBLIC_KEY = 'project_public_f3cfba6d4518d92040ad6dec92527887_rGbIg2e93d5a7ddfa7f49fb70cc5da0e41b3b';
const API_BASE = 'https://api.ilovepdf.com/v1';
const status = document.getElementById('status');
const progressBar = document.getElementById('progress-bar');
const progressFill = document.getElementById('progress-fill');
const downloadBtn = document.getElementById('download-btn');
const errorBox = document.getElementById('error-box');
function showStatus(msg){status.style.display='block';status.textContent=msg;}
function showProgress(pct){progressBar.style.display='block';progressFill.style.width=pct+'%';}
function showError(msg){errorBox.style.display='block';errorBox.textContent=msg;status.style.display='none';progressBar.style.display='none';}

document.getElementById('convert-btn').addEventListener('click', async()=>{
  const html = document.getElementById('html-inp').value.trim();
  if(!html){alert('Please paste some HTML code.');return;}
  errorBox.style.display='none';downloadBtn.style.display='none';
  showStatus('Getting token...');showProgress(10);
  try{
    const {token}=await(await fetch(API_BASE+'/auth',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({public_key:PUBLIC_KEY})})).json();
    if(!token)throw new Error('Authentication failed');
    showProgress(20);showStatus('Starting task...');
    const {server,task}=await(await fetch(API_BASE+'/start/htmlpdf',{headers:{'Authorization':'Bearer '+token}})).json();
    if(!task)throw new Error('Task creation failed');
    showProgress(40);showStatus('Converting HTML to PDF...');

    // Upload HTML as a file
    const blob = new Blob([html], {type:'text/html'});
    const file = new File([blob], 'page.html', {type:'text/html'});
    const fd = new FormData();
    fd.append('task', task);
    fd.append('file', file);
    const {server_filename}=await(await fetch('https://'+server+'/v1/upload',{method:'POST',headers:{'Authorization':'Bearer '+token},body:fd})).json();
    if(!server_filename)throw new Error('Upload failed');
    showProgress(65);showStatus('Processing...');

    const pd=await(await fetch('https://'+server+'/v1/process',{method:'POST',headers:{'Authorization':'Bearer '+token,'Content-Type':'application/json'},body:JSON.stringify({task,tool:'htmlpdf',files:[{server_filename,filename:'page.html'}]})})).json();
    if(pd.status!=='TaskSuccess')throw new Error('Conversion failed');
    showProgress(85);showStatus('Downloading...');

    const dlBlob=await(await fetch('https://'+server+'/v1/download/'+task,{headers:{'Authorization':'Bearer '+token}})).blob();
    const url=URL.createObjectURL(dlBlob);
    downloadBtn.href=url;downloadBtn.download='converted.pdf';
    downloadBtn.style.display='inline-block';
    showProgress(100);showStatus('Done! Your PDF is ready.');
  }catch(err){showError('Something went wrong: '+err.message);}
});
</script>
</body>
</html>
