<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ARYX Cloud Storage</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0d0f;
    --surface: #16161a;
    --surface2: #1e1e24;
    --border: #2a2a35;
    --accent: #c084fc;
    --accent2: #818cf8;
    --success: #34d399;
    --danger: #f87171;
    --text: #e8e8f0;
    --muted: #6b6b80;
    --radius: 14px;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px 60px;
  }

  /* glow bg */
  body::before {
    content: '';
    position: fixed;
    top: -200px; left: 50%;
    transform: translateX(-50%);
    width: 700px; height: 500px;
    background: radial-gradient(ellipse, rgba(192,132,252,0.08) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .wrapper { width: 100%; max-width: 720px; position: relative; z-index: 1; }

  /* Header */
  header { text-align: center; margin-bottom: 36px; }
  header h1 {
    font-family: 'Playfair Display', serif;
    font-size: 2.2rem;
    background: linear-gradient(135deg, #c084fc, #818cf8);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 8px;
  }
  header p { color: var(--muted); font-size: 0.92rem; }

  /* Upload zone */
  .upload-zone {
    border: 2px dashed var(--border);
    border-radius: var(--radius);
    background: var(--surface);
    padding: 48px 24px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.25s, background 0.25s;
    position: relative;
  }
  .upload-zone:hover, .upload-zone.drag { border-color: var(--accent); background: #1c1826; }
  .upload-zone input[type="file"] {
    position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
  }
  .upload-icon {
    width: 52px; height: 52px; margin: 0 auto 16px;
    background: linear-gradient(135deg, rgba(192,132,252,0.15), rgba(129,140,248,0.15));
    border-radius: 50%; display: flex; align-items: center; justify-content: center;
  }
  .upload-icon svg { width: 24px; height: 24px; stroke: var(--accent); fill: none; stroke-width: 2; }
  .upload-zone h3 { font-size: 1rem; font-weight: 500; margin-bottom: 6px; }
  .upload-zone small { color: var(--muted); font-size: 0.82rem; }

  /* Action row */
  .action-row { display: flex; gap: 12px; margin-top: 14px; }
  .btn {
    flex: 1; padding: 13px 20px; border-radius: 10px; border: none;
    font-family: 'DM Sans', sans-serif; font-size: 0.9rem; font-weight: 500;
    cursor: pointer; transition: opacity 0.2s, transform 0.15s;
  }
  .btn:active { transform: scale(0.97); }
  .btn-primary {
    background: linear-gradient(135deg, #c084fc, #818cf8);
    color: #fff;
  }
  .btn-primary:disabled { opacity: 0.45; cursor: not-allowed; }
  .btn-ghost {
    background: var(--surface2); color: var(--muted); border: 1px solid var(--border);
  }
  .btn-ghost:hover { color: var(--text); border-color: #444; }

  /* Progress */
  .progress-wrap { margin-top: 16px; display: none; }
  .progress-wrap.show { display: block; }
  .progress-bar-bg {
    background: var(--surface2); border-radius: 99px; height: 6px; overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%; width: 0%;
    background: linear-gradient(90deg, #c084fc, #818cf8);
    border-radius: 99px; transition: width 0.3s;
  }
  .progress-label {
    font-size: 0.8rem; color: var(--muted); margin-top: 7px; text-align: center;
  }

  /* Gallery */
  .gallery-header {
    display: flex; align-items: center; justify-content: space-between;
    margin: 32px 0 14px;
  }
  .gallery-header h2 { font-size: 1rem; font-weight: 600; }
  .badge {
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--muted); font-size: 0.75rem; padding: 3px 10px; border-radius: 99px;
  }
  .clear-btn {
    background: none; border: none; color: var(--muted); font-size: 0.82rem;
    cursor: pointer; font-family: 'DM Sans', sans-serif;
    padding: 4px 10px; border-radius: 6px; transition: color 0.2s, background 0.2s;
  }
  .clear-btn:hover { color: var(--danger); background: rgba(248,113,113,0.08); }

  .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 14px; }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    transition: border-color 0.2s, transform 0.2s;
    animation: fadeUp 0.3s ease both;
  }
  .card:hover { border-color: var(--accent); transform: translateY(-3px); }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .card-thumb {
    width: 100%; aspect-ratio: 16/10; object-fit: cover;
    background: var(--surface2); display: block;
  }
  .card-body { padding: 12px; }
  .card-name {
    font-size: 0.78rem; color: var(--muted);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    margin-bottom: 10px;
  }
  .url-row { display: flex; gap: 7px; align-items: center; }
  .url-input {
    flex: 1; background: var(--surface2); border: 1px solid var(--border);
    border-radius: 7px; padding: 7px 10px; font-size: 0.75rem;
    color: var(--text); font-family: 'DM Sans', sans-serif;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    outline: none; cursor: text;
  }
  .copy-btn {
    flex-shrink: 0; background: var(--surface2); border: 1px solid var(--border);
    border-radius: 7px; padding: 7px 10px; cursor: pointer;
    color: var(--muted); transition: background 0.2s, color 0.2s, border-color 0.2s;
    font-size: 0.75rem; font-family: 'DM Sans', sans-serif;
  }
  .copy-btn:hover { background: rgba(192,132,252,0.12); color: var(--accent); border-color: var(--accent); }
  .copy-btn.copied { color: var(--success); border-color: var(--success); background: rgba(52,211,153,0.08); }

  /* Delete */
  .card-footer { border-top: 1px solid var(--border); padding: 8px 12px; display: flex; justify-content: flex-end; }
  .del-btn {
    background: none; border: none; color: var(--muted); font-size: 0.75rem;
    cursor: pointer; font-family: 'DM Sans', sans-serif;
    padding: 3px 8px; border-radius: 5px; transition: color 0.2s, background 0.2s;
  }
  .del-btn:hover { color: var(--danger); background: rgba(248,113,113,0.08); }

  /* Toast */
  #toast {
    position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(80px);
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text); padding: 11px 22px; border-radius: 99px;
    font-size: 0.85rem; font-weight: 500; pointer-events: none;
    transition: transform 0.3s, opacity 0.3s; opacity: 0; z-index: 999;
  }
  #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
  #toast.success { border-color: var(--success); color: var(--success); }
  #toast.error   { border-color: var(--danger);  color: var(--danger);  }

  /* Empty state */
  .empty { text-align: center; padding: 40px 0; color: var(--muted); font-size: 0.88rem; }

  /* Preview strip */
  #preview-strip {
    display: flex; flex-wrap: wrap; gap: 8px; margin-top: 14px;
  }
  .preview-thumb {
    width: 64px; height: 64px; border-radius: 8px; object-fit: cover;
    border: 2px solid var(--border); background: var(--surface2);
  }
  .preview-name {
    font-size: 0.72rem; color: var(--muted); text-align: center;
    width: 64px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    margin-top: 2px;
  }
  .preview-item { display: flex; flex-direction: column; align-items: center; }
</style>
</head>
<body>

<div class="wrapper">
  <header>
    <h1>ARYX Cloud Storage</h1>
    <p>Upload images and copy direct URLs for your blog articles</p>
  </header>

  <!-- Upload Zone -->
  <div class="upload-zone" id="dropZone">
    <input type="file" id="fileInput" accept="image/*" multiple />
    <div class="upload-icon">
      <svg viewBox="0 0 24 24"><polyline points="16 16 12 12 8 16"/><line x1="12" y1="12" x2="12" y2="21"/><path d="M20.39 18.39A5 5 0 0018 9h-1.26A8 8 0 103 16.3"/></svg>
    </div>
    <h3>Drop images here or click to browse</h3>
    <small>Supports JPG, PNG, GIF, WEBP &bull; Max 32MB per file &bull; Multiple files allowed</small>
  </div>

  <!-- Preview strip -->
  <div id="preview-strip"></div>

  <!-- Action row -->
  <div class="action-row">
    <button class="btn btn-primary" id="uploadBtn" disabled>Upload to Cloud</button>
    <button class="btn btn-ghost" id="clearSelBtn">Clear Selection</button>
  </div>

  <!-- Progress -->
  <div class="progress-wrap" id="progressWrap">
    <div class="progress-bar-bg"><div class="progress-bar-fill" id="progressFill"></div></div>
    <div class="progress-label" id="progressLabel">Uploading...</div>
  </div>

  <!-- Gallery -->
  <div class="gallery-header">
    <div style="display:flex;align-items:center;gap:10px;">
      <h2>Uploaded Images</h2>
      <span class="badge" id="countBadge">0</span>
    </div>
    <button class="clear-btn" id="clearAllBtn">Clear all</button>
  </div>

  <div class="gallery" id="gallery">
    <div class="empty" id="emptyState">No images uploaded yet. Upload your first image above.</div>
  </div>
</div>

<div id="toast"></div>

<script>
const API_KEY = '7d837df2fe5cdd68ef59c09e47c55f1a';
const STORAGE_KEY = 'aryx_imgbb_uploads';

let selectedFiles = [];
let uploads = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');

const fileInput    = document.getElementById('fileInput');
const dropZone     = document.getElementById('dropZone');
const uploadBtn    = document.getElementById('uploadBtn');
const clearSelBtn  = document.getElementById('clearSelBtn');
const clearAllBtn  = document.getElementById('clearAllBtn');
const progressWrap = document.getElementById('progressWrap');
const progressFill = document.getElementById('progressFill');
const progressLabel= document.getElementById('progressLabel');
const gallery      = document.getElementById('gallery');
const emptyState   = document.getElementById('emptyState');
const previewStrip = document.getElementById('preview-strip');
const countBadge   = document.getElementById('countBadge');

// ---- Init ----
renderGallery();

// ---- Drag & Drop ----
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag'));
dropZone.addEventListener('drop', e => {
  e.preventDefault(); dropZone.classList.remove('drag');
  handleFiles([...e.dataTransfer.files]);
});
fileInput.addEventListener('change', () => handleFiles([...fileInput.files]));

function handleFiles(files) {
  selectedFiles = files.filter(f => f.type.startsWith('image/'));
  renderPreviewStrip();
  uploadBtn.disabled = selectedFiles.length === 0;
}

function renderPreviewStrip() {
  previewStrip.innerHTML = '';
  selectedFiles.forEach(f => {
    const item = document.createElement('div');
    item.className = 'preview-item';
    const img = document.createElement('img');
    img.className = 'preview-thumb';
    img.src = URL.createObjectURL(f);
    const name = document.createElement('div');
    name.className = 'preview-name';
    name.textContent = f.name;
    item.append(img, name);
    previewStrip.appendChild(item);
  });
}

// ---- Clear selection ----
clearSelBtn.addEventListener('click', () => {
  selectedFiles = [];
  fileInput.value = '';
  previewStrip.innerHTML = '';
  uploadBtn.disabled = true;
});

// ---- Upload ----
uploadBtn.addEventListener('click', async () => {
  if (!selectedFiles.length) return;
  uploadBtn.disabled = true;
  progressWrap.classList.add('show');
  progressFill.style.width = '0%';

  let done = 0;
  for (const file of selectedFiles) {
    progressLabel.textContent = `Uploading ${done + 1} of ${selectedFiles.length}: ${file.name}`;
    await uploadOne(file);
    done++;
    progressFill.style.width = (done / selectedFiles.length * 100) + '%';
  }

  progressLabel.textContent = 'All done!';
  setTimeout(() => progressWrap.classList.remove('show'), 1800);
  selectedFiles = [];
  fileInput.value = '';
  previewStrip.innerHTML = '';
  uploadBtn.disabled = true;
  saveAndRender();
  showToast('Images uploaded successfully!', 'success');
});

async function uploadOne(file) {
  const fd = new FormData();
  fd.append('image', file);
  fd.append('key', API_KEY);
  fd.append('name', file.name.replace(/\.[^.]+$/, ''));

  try {
    const res  = await fetch('https://api.imgbb.com/1/upload', { method: 'POST', body: fd });
    const data = await res.json();
    if (data.success) {
      uploads.unshift({
        id: data.data.id,
        name: file.name,
        url: data.data.url,
        display_url: data.data.display_url,
        thumb: data.data.thumb?.url || data.data.url,
        delete_url: data.data.delete_url,
        ts: Date.now()
      });
    } else {
      showToast('Upload failed: ' + (data.error?.message || 'Unknown error'), 'error');
    }
  } catch {
    showToast('Network error. Check your connection.', 'error');
  }
}

// ---- Clear all ----
clearAllBtn.addEventListener('click', () => {
  if (!uploads.length) return;
  if (!confirm('Remove all uploaded images from this list?')) return;
  uploads = [];
  saveAndRender();
  showToast('All cleared.', '');
});

// ---- Render Gallery ----
function saveAndRender() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(uploads));
  renderGallery();
}

function renderGallery() {
  countBadge.textContent = uploads.length;
  if (!uploads.length) {
    gallery.innerHTML = '';
    gallery.appendChild(emptyState);
    return;
  }
  gallery.innerHTML = '';
  uploads.forEach((item, idx) => {
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <img class="card-thumb" src="${item.thumb}" alt="${item.name}" loading="lazy"
           onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22200%22 height%22120%22/>'"/>
      <div class="card-body">
        <div class="card-name" title="${item.name}">${item.name}</div>
        <div class="url-row">
          <input class="url-input" readonly value="${item.display_url || item.url}" title="${item.display_url || item.url}"/>
          <button class="copy-btn" data-idx="${idx}">Copy</button>
        </div>
      </div>
      <div class="card-footer">
        <button class="del-btn" data-del="${idx}">Remove</button>
      </div>
    `;
    gallery.appendChild(card);
  });

  // Copy buttons
  gallery.querySelectorAll('.copy-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const idx = +btn.dataset.idx;
      const url = uploads[idx].display_url || uploads[idx].url;
      navigator.clipboard.writeText(url).then(() => {
        btn.textContent = 'Copied!';
        btn.classList.add('copied');
        showToast('URL copied to clipboard!', 'success');
        setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 1800);
      }).catch(() => {
        // fallback
        const ta = document.createElement('textarea');
        ta.value = url; document.body.appendChild(ta);
        ta.select(); document.execCommand('copy'); document.body.removeChild(ta);
        btn.textContent = 'Copied!'; btn.classList.add('copied');
        showToast('URL copied!', 'success');
        setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 1800);
      });
    });
  });

  // Delete buttons
  gallery.querySelectorAll('.del-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const idx = +btn.dataset.del;
      uploads.splice(idx, 1);
      saveAndRender();
    });
  });
}

// ---- Toast ----
const toastEl = document.getElementById('toast');
let toastTimer;
function showToast(msg, type) {
  toastEl.textContent = msg;
  toastEl.className = 'show ' + (type || '');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toastEl.className = '', 2500);
}
</script>
</body>
</html>
