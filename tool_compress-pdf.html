<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Compress PDF</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Poppins',sans-serif;background:#f4f4f8;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;}
.tool-wrap{background:#fff;border-radius:12px;padding:30px;max-width:700px;width:100%;box-shadow:0 4px 16px rgba(0,0,0,0.08);}
.tool-info{font-size:14px;color:#444;background:#e0f7f4;padding:10px 14px;border-radius:8px;display:block;margin-bottom:20px;border-left:4px solid #009688;}
.upload-area{border:2px dashed #d1c3c3;padding:40px;border-radius:10px;background:#fafafa;text-align:center;transition:0.3s;}
.upload-area.dragover{border-color:#009688;background:#e0f7f4;}
.select-btn{display:inline-block;background:#009688;color:#fff;padding:13px 32px;border-radius:50px;cursor:pointer;font-size:16px;font-family:'Poppins',sans-serif;position:relative;transition:background 0.2s;}
.select-btn:hover{background:#00796b;}
.select-btn input{position:absolute;opacity:0;left:0;top:0;width:100%;height:100%;cursor:pointer;}
#info{display:none;text-align:center;margin-top:15px;font-size:14px;color:#555;background:#f9f9f9;padding:10px;border-radius:8px;}
#status{text-align:center;margin-top:10px;font-weight:600;color:#009688;display:none;}
.btn-row{text-align:center;margin-top:15px;}
.action-btn{background:#009688;color:#fff;border:none;padding:13px 32px;font-size:16px;border-radius:50px;cursor:pointer;font-family:'Poppins',sans-serif;transition:background 0.2s;display:none;}
.action-btn:hover{background:#00796b;}
.download-btn{background:#e53935;color:#fff;border:none;padding:13px 32px;font-size:16px;border-radius:50px;cursor:pointer;font-family:'Poppins',sans-serif;text-decoration:none;display:none;transition:background 0.2s;}
.download-btn:hover{background:#c62828;}
</style>
</head>
<body>
<div class="tool-wrap">
  <span class="tool-info">Select your PDF to reduce its file size.</span>
  <div class="upload-area" id="drop-area">
    <label class="select-btn">
      + Choose PDF
      <input accept="application/pdf" id="file-input" type="file"/>
    </label>
  </div>
  <div id="info"></div>
  <div id="status"></div>
  <div class="btn-row">
    <button class="action-btn" id="compress-btn">Compress PDF</button>
    <a class="download-btn" id="download-btn">Download Compressed PDF</a>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
<script>
const drop=document.getElementById('drop-area');
const inp=document.getElementById('file-input');
const info=document.getElementById('info');
const status=document.getElementById('status');
const compBtn=document.getElementById('compress-btn');
const dlBtn=document.getElementById('download-btn');
let pdfFile=null;
['dragenter','dragover'].forEach(ev=>drop.addEventListener(ev,e=>{e.preventDefault();drop.classList.add('dragover');}));
['dragleave','drop'].forEach(ev=>drop.addEventListener(ev,e=>{e.preventDefault();drop.classList.remove('dragover');}));
drop.addEventListener('drop',e=>load(e.dataTransfer.files[0]));
inp.addEventListener('change',e=>load(e.target.files[0]));
function load(f){
  if(!f||f.type!=='application/pdf')return;
  pdfFile=f;
  info.style.display='block';info.textContent='Original size: '+(f.size/1024).toFixed(1)+' KB';
  compBtn.style.display='inline-block';
}
compBtn.addEventListener('click',async()=>{
  if(!pdfFile)return;
  compBtn.textContent='Compressing...';compBtn.disabled=true;
  status.style.display='block';status.textContent='Processing...';
  const {PDFDocument}=PDFLib;
  const buf=await pdfFile.arrayBuffer();
  const pdf=await PDFDocument.load(buf,{updateMetadata:false});
  const out=await pdf.save({useObjectStreams:true,addDefaultPage:false,objectsPerTick:50});
  const newSize=(out.byteLength/1024).toFixed(1);
  const origSize=(pdfFile.size/1024).toFixed(1);
  const saved=(((pdfFile.size-out.byteLength)/pdfFile.size)*100).toFixed(0);
  info.textContent='Original: '+origSize+' KB → Compressed: '+newSize+' KB ('+saved+'% smaller)';
  const url=URL.createObjectURL(new Blob([out],{type:'application/pdf'}));
  dlBtn.href=url;dlBtn.download='compressed.pdf';
  dlBtn.style.display='inline-block';compBtn.style.display='none';
  status.textContent='Compression complete.';
});
</script>
</body>
</html>
