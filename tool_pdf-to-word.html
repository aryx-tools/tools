<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PDF to Word</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Poppins',sans-serif;background:#f4f4f8;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;}
.tool-wrap{background:#fff;border-radius:12px;padding:30px;max-width:700px;width:100%;box-shadow:0 4px 16px rgba(0,0,0,0.08);}
.tool-info{font-size:14px;color:#444;background:#e0f7f4;padding:10px 14px;border-radius:8px;display:block;margin-bottom:20px;border-left:4px solid #009688;}
.upload-area{border:2px dashed #d1c3c3;padding:40px;border-radius:10px;background:#fafafa;text-align:center;transition:0.3s;}
.upload-area.dragover{border-color:#009688;background:#e0f7f4;}
.select-btn{display:inline-block;background:#009688;color:#fff;padding:13px 32px;border-radius:50px;cursor:pointer;font-size:16px;font-family:'Poppins',sans-serif;position:relative;transition:background 0.2s;}
.select-btn:hover{background:#00796b;}
.select-btn input{position:absolute;opacity:0;left:0;top:0;width:100%;height:100%;cursor:pointer;}
#p2w-status{display:none;text-align:center;margin-top:15px;font-weight:600;color:#009688;}
#p2w-result{display:none;margin-top:20px;}
#p2w-text{width:100%;height:280px;padding:12px;border:1px solid #ddd;border-radius:8px;font-size:13px;resize:vertical;font-family:monospace;outline:none;}
#p2w-text:focus{border-color:#009688;}
.btn-row{text-align:center;margin-top:12px;display:flex;gap:10px;justify-content:center;flex-wrap:wrap;}
.action-btn{background:#009688;color:#fff;border:none;padding:12px 28px;font-size:15px;border-radius:50px;cursor:pointer;font-family:'Poppins',sans-serif;transition:background 0.2s;}
.action-btn:hover{background:#00796b;}
.download-btn{background:#e53935;color:#fff;border:none;padding:12px 28px;font-size:15px;border-radius:50px;cursor:pointer;font-family:'Poppins',sans-serif;text-decoration:none;display:inline-block;transition:background 0.2s;}
.download-btn:hover{background:#c62828;}
</style>
</head>
<body>
<div class="tool-wrap">
  <span class="tool-info">Select your PDF to extract its text as an editable document.</span>
  <div class="upload-area" id="p2w-drop">
    <label class="select-btn">
      + Choose PDF
      <input accept="application/pdf" id="p2w-input" type="file"/>
    </label>
  </div>
  <div id="p2w-status"></div>
  <div id="p2w-result">
    <textarea id="p2w-text" readonly placeholder="Extracted text will appear here..."></textarea>
    <div class="btn-row">
      <button class="action-btn" id="p2w-copy">Copy Text</button>
      <a class="download-btn" id="p2w-dl">Download .txt</a>
    </div>
  </div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
const drop=document.getElementById('p2w-drop');
const inp=document.getElementById('p2w-input');
const status=document.getElementById('p2w-status');
const result=document.getElementById('p2w-result');
const textArea=document.getElementById('p2w-text');
const dl=document.getElementById('p2w-dl');
['dragenter','dragover'].forEach(ev=>drop.addEventListener(ev,e=>{e.preventDefault();drop.classList.add('dragover');}));
['dragleave','drop'].forEach(ev=>drop.addEventListener(ev,e=>{e.preventDefault();drop.classList.remove('dragover');}));
drop.addEventListener('drop',e=>process(e.dataTransfer.files[0]));
inp.addEventListener('change',e=>process(e.target.files[0]));
async function process(file){
  if(!file||file.type!=='application/pdf')return;
  status.style.display='block';status.textContent='Extracting text...';result.style.display='none';
  const buf=await file.arrayBuffer();
  const pdf=await pdfjsLib.getDocument({data:buf}).promise;
  let text='';
  for(let i=1;i<=pdf.numPages;i++){
    status.textContent='Processing page '+i+' of '+pdf.numPages+'...';
    const page=await pdf.getPage(i);
    const content=await page.getTextContent();
    text+='--- Page '+i+' ---\n'+content.items.map(s=>s.str).join(' ')+'\n\n';
  }
  textArea.value=text;
  const blob=new Blob([text],{type:'text/plain'});
  dl.href=URL.createObjectURL(blob);dl.download='converted.txt';
  status.textContent='Done. '+pdf.numPages+' page(s) extracted.';
  result.style.display='block';
}
document.getElementById('p2w-copy').addEventListener('click',function(){
  textArea.select();document.execCommand('copy');
  this.textContent='Copied!';setTimeout(()=>this.textContent='Copy Text',2000);
});
</script>
</body>
</html>
