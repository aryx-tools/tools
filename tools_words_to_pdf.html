<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Word to PDF</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Poppins',sans-serif;background:#f4f4f8;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;}
.tool-wrap{background:#fff;border-radius:12px;padding:30px;max-width:700px;width:100%;box-shadow:0 4px 16px rgba(0,0,0,0.08);}
.tool-info{font-size:14px;color:#444;background:#e0f7f4;padding:10px 14px;border-radius:8px;display:block;margin-bottom:20px;border-left:4px solid #009688;}
.upload-area{border:2px dashed #d1c3c3;padding:40px;border-radius:10px;background:#fafafa;text-align:center;transition:0.3s;}
.upload-area.dragover{border-color:#009688;background:#e0f7f4;}
.select-btn{display:inline-block;background:#009688;color:#fff;padding:13px 32px;border-radius:50px;cursor:pointer;font-size:16px;font-family:'Poppins',sans-serif;position:relative;transition:background 0.2s;}
.select-btn:hover{background:#00796b;}
.select-btn input{position:absolute;opacity:0;left:0;top:0;width:100%;height:100%;cursor:pointer;}
#status{text-align:center;margin-top:15px;font-weight:600;color:#009688;display:none;}
.progress-bar{width:100%;background:#e0e0e0;border-radius:50px;height:8px;margin-top:12px;display:none;}
.progress-fill{height:8px;background:#009688;border-radius:50px;transition:width 0.3s;width:0%;}
.btn-row{text-align:center;margin-top:15px;}
.download-btn{background:#e53935;color:#fff;border:none;padding:13px 32px;font-size:16px;border-radius:50px;cursor:pointer;font-family:'Poppins',sans-serif;text-decoration:none;display:none;transition:background 0.2s;}
.download-btn:hover{background:#c62828;}
.error-box{background:#fff3f3;border:1px solid #f44336;border-radius:8px;padding:12px 16px;color:#c62828;font-size:13px;margin-top:12px;display:none;}
</style>
</head>
<body>
<div class="tool-wrap">
  <span class="tool-info">Select your Word document (.docx) to convert it to PDF.</span>
  <div class="upload-area" id="drop-area">
    <label class="select-btn">
      + Choose Word File
      <input accept=".docx,.doc" id="file-input" type="file"/>
    </label>
  </div>
  <div class="progress-bar" id="progress-bar">
    <div class="progress-fill" id="progress-fill"></div>
  </div>
  <div id="status"></div>
  <div class="error-box" id="error-box"></div>
  <div class="btn-row">
    <a class="download-btn" id="download-btn">Download PDF</a>
  </div>
</div>
<script>
const PUBLIC_KEY = 'project_public_f3cfba6d4518d92040ad6dec92527887_rGbIg2e93d5a7ddfa7f49fb70cc5da0e41b3b';
const API_BASE = 'https://api.ilovepdf.com/v1';
const dropArea = document.getElementById('drop-area');
const fileInput = document.getElementById('file-input');
const status = document.getElementById('status');
const progressBar = document.getElementById('progress-bar');
const progressFill = document.getElementById('progress-fill');
const downloadBtn = document.getElementById('download-btn');
const errorBox = document.getElementById('error-box');
['dragenter','dragover'].forEach(ev=>dropArea.addEventListener(ev,e=>{e.preventDefault();dropArea.classList.add('dragover');}));
['dragleave','drop'].forEach(ev=>dropArea.addEventListener(ev,e=>{e.preventDefault();dropArea.classList.remove('dragover');}));
dropArea.addEventListener('drop',e=>handleFile(e.dataTransfer.files[0]));
fileInput.addEventListener('change',e=>handleFile(e.target.files[0]));
function showStatus(msg){status.style.display='block';status.textContent=msg;}
function showProgress(pct){progressBar.style.display='block';progressFill.style.width=pct+'%';}
function showError(msg){errorBox.style.display='block';errorBox.textContent=msg;status.style.display='none';progressBar.style.display='none';}
async function handleFile(file){
  if(!file)return;
  errorBox.style.display='none';downloadBtn.style.display='none';
  showStatus('Getting token...');showProgress(10);
  try{
    const {token}=await(await fetch(API_BASE+'/auth',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({public_key:PUBLIC_KEY})})).json();
    if(!token)throw new Error('Authentication failed');
    showProgress(20);showStatus('Starting task...');
    const {server,task}=await(await fetch(API_BASE+'/start/officepdf',{headers:{'Authorization':'Bearer '+token}})).json();
    if(!task)throw new Error('Task creation failed');
    showProgress(35);showStatus('Uploading file...');
    const fd=new FormData();fd.append('task',task);fd.append('file',file);
    const {server_filename}=await(await fetch('https://'+server+'/v1/upload',{method:'POST',headers:{'Authorization':'Bearer '+token},body:fd})).json();
    if(!server_filename)throw new Error('Upload failed');
    showProgress(60);showStatus('Converting to PDF...');
    const pd=await(await fetch('https://'+server+'/v1/process',{method:'POST',headers:{'Authorization':'Bearer '+token,'Content-Type':'application/json'},body:JSON.stringify({task,tool:'officepdf',files:[{server_filename,filename:file.name}]})})).json();
    if(pd.status!=='TaskSuccess')throw new Error('Conversion failed');
    showProgress(85);showStatus('Downloading...');
    const blob=await(await fetch('https://'+server+'/v1/download/'+task,{headers:{'Authorization':'Bearer '+token}})).blob();
    const url=URL.createObjectURL(blob);
    downloadBtn.href=url;downloadBtn.download=file.name.replace(/\.(docx|doc)$/i,'.pdf');
    downloadBtn.style.display='inline-block';showProgress(100);showStatus('Done! Your PDF is ready.');
  }catch(err){showError('Something went wrong: '+err.message);}
}
</script>
</body>
</html>
