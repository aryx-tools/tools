<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>JPG to PDF</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Poppins',sans-serif;background:#f4f4f8;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;}
.tool-wrap{background:#fff;border-radius:12px;padding:30px;max-width:700px;width:100%;box-shadow:0 4px 16px rgba(0,0,0,0.08);}
.tool-info{font-size:14px;color:#444;background:#e0f7f4;padding:10px 14px;border-radius:8px;display:block;margin-bottom:20px;border-left:4px solid #009688;}
.upload-area{border:2px dashed #d1c3c3;padding:40px;border-radius:10px;background:#fafafa;text-align:center;transition:0.3s;}
.upload-area.dragover{border-color:#009688;background:#e0f7f4;}
.select-btn{display:inline-block;background:#009688;color:#fff;padding:13px 32px;border-radius:50px;cursor:pointer;font-size:16px;font-family:'Poppins',sans-serif;position:relative;transition:background 0.2s;}
.select-btn:hover{background:#00796b;}
.select-btn input{position:absolute;opacity:0;left:0;top:0;width:100%;height:100%;cursor:pointer;}
#preview{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin-top:20px;}
#preview img{width:80px;height:80px;object-fit:cover;border-radius:6px;border:1px solid #ddd;}
#status{text-align:center;margin-top:10px;font-weight:600;color:#009688;display:none;}
.btn-row{text-align:center;margin-top:15px;}
.action-btn{background:#009688;color:#fff;border:none;padding:13px 32px;font-size:16px;border-radius:50px;cursor:pointer;font-family:'Poppins',sans-serif;transition:background 0.2s;display:none;}
.action-btn:hover{background:#00796b;}
.download-btn{background:#e53935;color:#fff;border:none;padding:13px 32px;font-size:16px;border-radius:50px;cursor:pointer;font-family:'Poppins',sans-serif;text-decoration:none;display:none;transition:background 0.2s;}
.download-btn:hover{background:#c62828;}
</style>
</head>
<body>
<div class="tool-wrap">
  <span class="tool-info">Add JPG images to convert them into a single PDF document.</span>
  <div class="upload-area" id="drop-area">
    <label class="select-btn">
      + Add Images
      <input accept="image/jpeg,image/jpg,image/png" id="file-input" multiple type="file"/>
    </label>
  </div>
  <div id="preview"></div>
  <div id="status"></div>
  <div class="btn-row">
    <button class="action-btn" id="convert-btn">Convert to PDF</button>
    <a class="download-btn" id="download-btn">Download PDF</a>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
<script>
const drop=document.getElementById('drop-area');
const inp=document.getElementById('file-input');
const preview=document.getElementById('preview');
const status=document.getElementById('status');
const convertBtn=document.getElementById('convert-btn');
const dlBtn=document.getElementById('download-btn');
let imgFiles=[];
['dragenter','dragover'].forEach(ev=>drop.addEventListener(ev,e=>{e.preventDefault();drop.classList.add('dragover');}));
['dragleave','drop'].forEach(ev=>drop.addEventListener(ev,e=>{e.preventDefault();drop.classList.remove('dragover');}));
drop.addEventListener('drop',e=>addImages(e.dataTransfer.files));
inp.addEventListener('change',e=>addImages(e.target.files));
function addImages(files){
  for(const f of files){
    imgFiles.push(f);
    const img=document.createElement('img');
    const reader=new FileReader();
    reader.onload=ev=>{img.src=ev.target.result;};
    reader.readAsDataURL(f);
    preview.appendChild(img);
  }
  if(imgFiles.length>0)convertBtn.style.display='inline-block';
}
convertBtn.addEventListener('click',async()=>{
  convertBtn.textContent='Converting...';convertBtn.disabled=true;
  status.style.display='block';status.textContent='Building PDF...';
  const {PDFDocument}=PDFLib;
  const pdf=await PDFDocument.create();
  for(const f of imgFiles){
    const buf=await f.arrayBuffer();
    let img;
    try{img=await pdf.embedJpg(buf);}catch(e){img=await pdf.embedPng(buf);}
    const page=pdf.addPage([img.width,img.height]);
    page.drawImage(img,{x:0,y:0,width:img.width,height:img.height});
  }
  const out=await pdf.save();
  const url=URL.createObjectURL(new Blob([out],{type:'application/pdf'}));
  dlBtn.href=url;dlBtn.download='images.pdf';
  dlBtn.style.display='inline-block';convertBtn.style.display='none';
  status.textContent='Done! '+imgFiles.length+' image(s) converted.';
});
</script>
</body>
</html>
